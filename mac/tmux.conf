# ── General ───────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -g mouse on
set -g base-index 1             # windows start at 1
set -g renumber-windows on      # close a window, numbers stay sequential
set -g escape-time 0            # no esc delay
set -g history-limit 10000

# ── Prefix: ctrl+a (more ergonomic) ───────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Bell / notification ────────────────────────────────────────
set -g bell-action any          # bells from any window propagate to iTerm2
set -g visual-bell off          # let iTerm2 handle the visual/system notification

# ── Status bar (the minimap) ───────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left ""
set -g status-right "#($HOME/.tmux/apm-bar.sh)| %H:%M "
set -g status-right-style "fg=#585b70"

# red = needs input (timer), green = working, grey = idle
# @waiting: 0=working (PreToolUse), 1=needs input (Notification), 2=idle (Stop)
set -g status-interval 2
set -g window-status-format "#($HOME/.tmux/window-status.sh #{window_id} #{window_index} #{window_name})"
set -g window-status-current-format "#($HOME/.tmux/window-status.sh #{window_id} #{window_index} #{window_name} current)"

# ── Spawn claude sessions ──────────────────────────────────────
# ctrl+a → n  prompt for path, open new claude window there
bind n run-shell "$HOME/.tmux/log-action.sh tmux-newwin" \; command-prompt -p "dir:" "new-window -c '%1' 'claude'"

# ctrl+a → N  fuzzy-pick from repos and open claude there
bind N run-shell "$HOME/.tmux/log-action.sh tmux-picker" \; display-popup -E -w 60% -h 70% "$HOME/.tmux/launch-claude.sh"

# ── Pane splitting ─────────────────────────────────────────────
bind | run-shell "$HOME/.tmux/log-action.sh tmux-split-h" \; split-window -h -c "#{pane_current_path}"
bind - run-shell "$HOME/.tmux/log-action.sh tmux-split-v" \; split-window -v -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display "tmux reloaded"

# ── Navigation (logged for APM) ────────────────────────────────
bind w run-shell "$HOME/.tmux/log-action.sh tmux-winlist" \; choose-tree -Zw
bind s run-shell "$HOME/.tmux/log-action.sh tmux-sessions" \; choose-tree

# ── APM ────────────────────────────────────────────────────────
set-hook -g after-select-window "run-shell \"$HOME/.tmux/log-action.sh switch\""
bind A display-popup -E -w 48 -h 22 "$HOME/.tmux/stats.sh"
